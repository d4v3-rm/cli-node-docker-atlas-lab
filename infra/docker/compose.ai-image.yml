name: cli-node-docker-atlas-lab

# Optional AI image layer for InvokeAI, SwarmUI, Fooocus, FLUX.2 klein 4B, and Qwen-Image-2512.
services:
  gateway:
    environment:
      ATLAS_AI_IMAGE_ENABLED: "true"

  gateway-ai-image:
    build:
      context: ../..
      dockerfile: infra/docker/images/gateway/Dockerfile
      args:
        CADDY_VERSION: ${CADDY_VERSION}
    restart: unless-stopped
    env_file:
      - ../../env/lab.env
    environment:
      ATLAS_GATEWAY_TEMPLATE: Caddyfile.ai-image.template
      ATLAS_AI_LLM_ENABLED: "false"
      ATLAS_AI_IMAGE_ENABLED: "true"
      ATLAS_WORKBENCH_ENABLED: "false"
    ports:
      - "${INVOKEAI_HTTPS_PORT}:${INVOKEAI_HTTPS_PORT}"
      - "${SWARMUI_HTTPS_PORT}:${SWARMUI_HTTPS_PORT}"
      - "${FOOOCUS_HTTPS_PORT}:${FOOOCUS_HTTPS_PORT}"
    volumes:
      - gateway-certs:/etc/caddy/certs
      - gateway-config:/etc/caddy/dynamic
      - gateway-data:/data
    depends_on:
      gateway:
        condition: service_started
      invokeai:
        condition: service_healthy
      swarmui:
        condition: service_healthy
      fooocus:
        condition: service_started
    networks:
      - edge-net
      - ai-image-net

  invokeai:
    build:
      context: ../..
      dockerfile: infra/docker/images/invokeai/Dockerfile
      args:
        BASE_IMAGE: ${INVOKEAI_IMAGE}
    restart: unless-stopped
    gpus: ${OLLAMA_GPU_REQUEST}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/')\" || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    environment:
      MODEL_REPO: ${INVOKEAI_MODEL_REPO}
      MODEL_REVISION: ${INVOKEAI_MODEL_REVISION}
      MODEL_TARGET_DIR: /invokeai/models/external/flux2-klein-4b
      MODEL_TITLE: ${INVOKEAI_MODEL_TITLE}
      TZ: ${TZ}
      INVOKEAI_HOST: 0.0.0.0
      INVOKEAI_PORT: "9090"
      INVOKEAI_ROOT: /invokeai
      INVOKEAI_MODELS_DIR: /invokeai/models
      INVOKEAI_SCAN_MODELS_ON_STARTUP: "true"
      NVIDIA_VISIBLE_DEVICES: ${OLLAMA_NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${OLLAMA_NVIDIA_DRIVER_CAPABILITIES}
    volumes:
      - invokeai-data:/invokeai
    networks:
      ai-image-net:
      services-egress-net:
        gw_priority: 1

  swarmui:
    build:
      context: ../..
      dockerfile: infra/docker/images/swarmui/Dockerfile
      args:
        SWARMUI_GIT_REF: ${SWARMUI_GIT_REF}
    restart: unless-stopped
    gpus: ${OLLAMA_GPU_REQUEST}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:7801/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 300s
    environment:
      NVIDIA_VISIBLE_DEVICES: ${OLLAMA_NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${OLLAMA_NVIDIA_DRIVER_CAPABILITIES}
      SWARMUI_INSTANCE_TITLE: AtlasSwarmUI
      SWARMUI_MODEL_REPO: ${SWARMUI_MODEL_REPO}
      SWARMUI_MODEL_REVISION: ${SWARMUI_MODEL_REVISION}
      SWARMUI_MODEL_FILE: ${SWARMUI_MODEL_FILE}
      SWARMUI_MODEL_TITLE: ${SWARMUI_MODEL_TITLE}
    volumes:
      - swarmui-data:/SwarmUI/Data
      - swarmui-backend:/SwarmUI/dlbackend
      - swarmui-dlnodes:/SwarmUI/src/BuiltinExtensions/ComfyUIBackend/DLNodes
      - swarmui-extensions:/SwarmUI/src/Extensions
      - swarmui-models:/SwarmUI/Models
      - swarmui-output:/SwarmUI/Output
    networks:
      ai-image-net:
      services-egress-net:
        gw_priority: 1

  fooocus:
    image: ${FOOOCUS_IMAGE}
    restart: unless-stopped
    gpus: ${OLLAMA_GPU_REQUEST}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7865/')\" || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 1800s
    environment:
      CMDARGS: ${FOOOCUS_CMDARGS}
      DATADIR: /content/data
      config_path: /content/data/config.txt
      config_example_path: /content/data/config_modification_tutorial.txt
      path_checkpoints: /content/data/models/checkpoints/
      path_loras: /content/data/models/loras/
      path_embeddings: /content/data/models/embeddings/
      path_vae_approx: /content/data/models/vae_approx/
      path_upscale_models: /content/data/models/upscale_models/
      path_inpaint: /content/data/models/inpaint/
      path_controlnet: /content/data/models/controlnet/
      path_clip_vision: /content/data/models/clip_vision/
      path_fooocus_expansion: /content/data/models/prompt_expansion/fooocus_expansion/
      path_outputs: /content/app/outputs/
      NVIDIA_VISIBLE_DEVICES: ${OLLAMA_NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${OLLAMA_NVIDIA_DRIVER_CAPABILITIES}
    volumes:
      - fooocus-data:/content/data
    networks:
      ai-image-net:
      services-egress-net:
        gw_priority: 1

networks:
  edge-net:
    name: cli-node-docker-atlas-lab_edge
  ai-image-net:
    name: cli-node-docker-atlas-lab_ai_image
    internal: true
  services-egress-net:
    name: cli-node-docker-atlas-lab_services_egress

volumes:
  gateway-certs:
  gateway-config:
  gateway-data:
  invokeai-data:
  swarmui-data:
  swarmui-backend:
  swarmui-dlnodes:
  swarmui-extensions:
  swarmui-models:
  swarmui-output:
  fooocus-data:
