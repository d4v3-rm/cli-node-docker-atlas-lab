name: cli-node-docker-atlas-lab

# Optional AI agents layer for n8n and its external task runners.
x-lab-env: &lab-env
  TZ: ${TZ}

services:
  gateway:
    environment:
      ATLAS_AI_AGENTS_ENABLED: "true"

  gateway-ai-agents:
    build:
      context: ../..
      dockerfile: infra/docker/images/gateway/Dockerfile
      args:
        CADDY_VERSION: ${CADDY_VERSION}
    restart: unless-stopped
    env_file:
      - ../../env/lab.env
    environment:
      ATLAS_GATEWAY_TEMPLATE: Caddyfile.ai-agents.template
      ATLAS_AI_LLM_ENABLED: "false"
      ATLAS_AI_AGENTS_ENABLED: "true"
      ATLAS_AI_IMAGE_ENABLED: "false"
      ATLAS_AI_VIDEO_ENABLED: "false"
      ATLAS_WORKBENCH_ENABLED: "false"
    ports:
      - "${N8N_HTTPS_PORT}:${N8N_HTTPS_PORT}"
    volumes:
      - gateway-certs:/etc/caddy/certs
      - gateway-config:/etc/caddy/dynamic
      - gateway-data:/data
    depends_on:
      gateway:
        condition: service_started
      n8n:
        condition: service_healthy
    networks:
      - edge-net
      - ai-agents-net

  n8n:
    build:
      context: ../..
      dockerfile: infra/docker/images/n8n/Dockerfile
      args:
        N8N_VERSION: ${N8N_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/healthz/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    environment:
      <<: *lab-env
      GENERIC_TIMEZONE: ${TZ}
      N8N_HOST: ${LAB_PUBLIC_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_URL}
      WEBHOOK_URL: ${N8N_URL}
      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      NODE_OPTIONS: --use-openssl-ca
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "true"
      EXTERNAL_FRONTEND_HOOKS_URLS: ""
      N8N_DIAGNOSTICS_CONFIG_FRONTEND: ""
      N8N_DIAGNOSTICS_CONFIG_BACKEND: ""
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      ai-agents-net:
      services-egress-net:
        gw_priority: 1

  n8n-runners:
    build:
      context: ../..
      dockerfile: infra/docker/images/n8n-runners/Dockerfile
      args:
        N8N_VERSION: ${N8N_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5680/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      <<: *lab-env
      GENERIC_TIMEZONE: ${TZ}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      NODE_OPTIONS: --use-openssl-ca
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: ${N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT}
    networks:
      ai-agents-net:
      services-egress-net:
        gw_priority: 1

networks:
  edge-net:
    name: cli-node-docker-atlas-lab_edge
  ai-agents-net:
    name: cli-node-docker-atlas-lab_ai_agents
    internal: true
  services-egress-net:
    name: cli-node-docker-atlas-lab_services_egress

volumes:
  gateway-certs:
  gateway-config:
  gateway-data:
  n8n-data:
