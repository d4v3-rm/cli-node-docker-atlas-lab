name: cli-node-docker-atlas-lab

# Optional AI video layer for ComfyUI and managed local video model sets.
services:
  gateway:
    environment:
      ATLAS_AI_VIDEO_ENABLED: "true"

  gateway-ai-video:
    build:
      context: ../..
      dockerfile: infra/docker/images/gateway/Dockerfile
      args:
        CADDY_VERSION: ${CADDY_VERSION}
    restart: unless-stopped
    env_file:
      - ../../env/lab.env
    environment:
      ATLAS_GATEWAY_TEMPLATE: Caddyfile.ai-video.template
      ATLAS_AI_LLM_ENABLED: "false"
      ATLAS_AI_IMAGE_ENABLED: "false"
      ATLAS_AI_VIDEO_ENABLED: "true"
      ATLAS_WORKBENCH_ENABLED: "false"
    ports:
      - "${COMFYUI_HTTPS_PORT}:${COMFYUI_HTTPS_PORT}"
    volumes:
      - gateway-certs:/etc/caddy/certs
      - gateway-config:/etc/caddy/dynamic
      - gateway-data:/data
    depends_on:
      gateway:
        condition: service_started
      comfyui:
        condition: service_healthy
    networks:
      - edge-net
      - ai-video-net

  comfyui:
    build:
      context: ../..
      dockerfile: infra/docker/images/comfyui/Dockerfile
      args:
        BASE_IMAGE: ${COMFYUI_BASE_IMAGE}
        COMFYUI_REPO: ${COMFYUI_REPO}
        COMFYUI_REVISION: ${COMFYUI_REVISION}
    restart: unless-stopped
    gpus: ${OLLAMA_GPU_REQUEST}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:8188/ || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 1200s
    environment:
      MODEL_MANIFEST_PATH: /opt/atlas-lab/model-sync/comfyui-models.json
      TZ: ${TZ}
      NVIDIA_VISIBLE_DEVICES: ${OLLAMA_NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${OLLAMA_NVIDIA_DRIVER_CAPABILITIES}
    volumes:
      - comfyui-models:/opt/ComfyUI/models
      - comfyui-output:/opt/ComfyUI/output
      - ../../infra/docker/images/model-sync/download-model.py:/usr/local/bin/download-model.py:ro
      - ../../config/models/comfyui-models.json:/opt/atlas-lab/model-sync/comfyui-models.json:ro
    networks:
      ai-video-net:
      services-egress-net:
        gw_priority: 1

networks:
  edge-net:
    name: cli-node-docker-atlas-lab_edge
  ai-video-net:
    name: cli-node-docker-atlas-lab_ai_video
    internal: true
  services-egress-net:
    name: cli-node-docker-atlas-lab_services_egress

volumes:
  gateway-certs:
  gateway-config:
  gateway-data:
  comfyui-models:
  comfyui-output:
