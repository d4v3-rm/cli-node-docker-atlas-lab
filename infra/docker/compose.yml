name: cli-node-docker-atlas-lab

# Core infrastructure entrypoint for the local Atlas Lab stack.
x-lab-env: &lab-env
  TZ: ${TZ}

services:
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/images/gateway/Dockerfile
      args:
        CADDY_VERSION: ${CADDY_VERSION}
    restart: unless-stopped
    env_file:
      - ../../env/lab.env
    environment:
      ATLAS_AI_LLM_ENABLED: "false"
      ATLAS_WORKBENCH_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 $$LAB_HTTPS_PORT || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 2s
    ports:
      - "${LAB_HTTPS_PORT}:${LAB_HTTPS_PORT}"
      - "${GITLAB_HTTPS_PORT}:${GITLAB_HTTPS_PORT}"
      - "${BOOKSTACK_HTTPS_PORT}:${BOOKSTACK_HTTPS_PORT}"
    volumes:
      - gateway-certs:/etc/caddy/certs
      - gateway-config:/etc/caddy/dynamic
      - gateway-site:/srv
      - gateway-data:/data
    depends_on:
      gitlab:
        condition: service_started
      bookstack:
        condition: service_healthy
    networks:
      - edge-net
      - apps-net

  gitlab:
    image: gitlab/gitlab-ce:${GITLAB_VERSION}
    hostname: ${LAB_PUBLIC_HOST}
    restart: unless-stopped
    shm_size: "256m"
    environment:
      <<: *lab-env
      GITLAB_ROOT_EMAIL: ${GITLAB_ROOT_EMAIL}
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD}
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL}'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        letsencrypt['enable'] = false
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD}'
        gitlab_rails['signup_enabled'] = false
        gitlab_rails['time_zone'] = '${TZ}'
        registry['enable'] = false
        gitlab_pages['enable'] = false
        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 10
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/-/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    networks:
      apps-net:
      services-egress-net:
        gw_priority: 1

  bookstack:
    image: lscr.io/linuxserver/bookstack:${BOOKSTACK_VERSION}
    restart: unless-stopped
    depends_on:
      bookstack-db:
        condition: service_healthy
    environment:
      <<: *lab-env
      PUID: ${BOOKSTACK_UID}
      PGID: ${BOOKSTACK_GID}
      APP_URL: ${BOOKSTACK_APP_URL}
      APP_KEY: ${BOOKSTACK_APP_KEY}
      DB_HOST: bookstack-db
      DB_PORT: "3306"
      DB_USERNAME: ${BOOKSTACK_DB_USER}
      DB_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
      DB_DATABASE: ${BOOKSTACK_DB_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",80); exit($$s ? 0 : 1);'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    volumes:
      - bookstack-config:/config
    networks:
      apps-net:
      bookstack-net:
      services-egress-net:
        gw_priority: 1

  bookstack-db:
    image: mariadb:${BOOKSTACK_DB_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p$$MARIADB_ROOT_PASSWORD"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      MARIADB_DATABASE: ${BOOKSTACK_DB_DATABASE}
      MARIADB_USER: ${BOOKSTACK_DB_USER}
      MARIADB_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${BOOKSTACK_DB_ROOT_PASSWORD}
    volumes:
      - bookstack-db:/var/lib/mysql
    networks:
      - bookstack-net

networks:
  edge-net:
    name: cli-node-docker-atlas-lab_edge
  services-egress-net:
    name: cli-node-docker-atlas-lab_services_egress
  apps-net:
    name: cli-node-docker-atlas-lab_apps
    internal: true
  bookstack-net:
    name: cli-node-docker-atlas-lab_bookstack
    internal: true
volumes:
  gateway-certs:
  gateway-config:
  gateway-site:
  gateway-data:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  bookstack-config:
  bookstack-db:
