# Infrastructure entrypoint for the local Lab Atlas stack.
x-lab-env: &lab-env
  TZ: ${TZ}

x-workbench-db-env: &workbench-db-env
  PGHOST: postgres-dev
  PGPORT: "5432"
  PGDATABASE: ${POSTGRES_DEV_DATABASE}
  PGUSER: ${POSTGRES_DEV_SUPERUSER}
  PGPASSWORD: ${POSTGRES_DEV_PASSWORD}
  PGSSLMODE: disable
  DATABASE_URL: postgresql://${POSTGRES_DEV_SUPERUSER}:${POSTGRES_DEV_PASSWORD}@postgres-dev:5432/${POSTGRES_DEV_DATABASE}

services:
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/images/gateway/Dockerfile
      args:
        CADDY_VERSION: ${CADDY_VERSION}
    restart: unless-stopped
    env_file:
      - ../../config/env/lab.env
    ports:
      - "${LAB_HTTPS_PORT}:${LAB_HTTPS_PORT}"
      - "${GITEA_HTTPS_PORT}:${GITEA_HTTPS_PORT}"
      - "${N8N_HTTPS_PORT}:${N8N_HTTPS_PORT}"
      - "${OPENWEBUI_HTTPS_PORT}:${OPENWEBUI_HTTPS_PORT}"
      - "${OLLAMA_HTTPS_PORT}:${OLLAMA_HTTPS_PORT}"
      - "${NODE_DEV_HTTPS_PORT}:${NODE_DEV_HTTPS_PORT}"
      - "${PYTHON_DEV_HTTPS_PORT}:${PYTHON_DEV_HTTPS_PORT}"
      - "${AI_DEV_HTTPS_PORT}:${AI_DEV_HTTPS_PORT}"
      - "${CPP_DEV_HTTPS_PORT}:${CPP_DEV_HTTPS_PORT}"
    volumes:
      - gateway-certs:/etc/caddy/certs
      - gateway-config:/etc/caddy/dynamic
      - gateway-site:/srv
      - gateway-data:/data
    depends_on:
      gitea:
        condition: service_healthy
      n8n:
        condition: service_healthy
      open-webui:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - edge-net
      - apps-net
      - ai-net
      - workbench-net

  gitea:
    image: gitea/gitea:${GITEA_VERSION}
    restart: unless-stopped
    depends_on:
      gitea-db:
        condition: service_healthy
    environment:
      <<: *lab-env
      USER_UID: ${GITEA_UID}
      USER_GID: ${GITEA_GID}
      GITEA__server__DOMAIN: ${LAB_PUBLIC_HOST}
      GITEA__server__ROOT_URL: ${GITEA_URL}
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__PROTOCOL: http
      GITEA__server__DISABLE_SSH: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__COOKIE_SECURE: "true"
      GITEA__database__DB_TYPE: mysql
      GITEA__database__HOST: gitea-db:3306
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__database__SSL_MODE: disable
      GITEA__database__CHARSET: utf8mb4
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s
    volumes:
      - gitea-data:/data
    networks:
      apps-net:
      data-net:
      services-egress-net:
        gw_priority: 1

  gitea-db:
    image: mariadb:${GITEA_DB_VERSION}
    restart: unless-stopped
    command: ["--innodb_linux_aio=aio"]
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p$$MARIADB_ROOT_PASSWORD"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      MARIADB_DATABASE: gitea
      MARIADB_USER: gitea
      MARIADB_PASSWORD: ${GITEA_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${GITEA_DB_ROOT_PASSWORD}
    volumes:
      - gitea-db:/var/lib/mysql
    networks:
      - data-net

  n8n:
    build:
      context: ../..
      dockerfile: infra/docker/images/n8n/Dockerfile
      args:
        N8N_VERSION: ${N8N_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/healthz/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    environment:
      <<: *lab-env
      GENERIC_TIMEZONE: ${TZ}
      N8N_HOST: ${LAB_PUBLIC_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_URL}
      WEBHOOK_URL: ${N8N_URL}
      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      NODE_OPTIONS: --use-openssl-ca
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      EXTERNAL_FRONTEND_HOOKS_URLS: ""
      N8N_DIAGNOSTICS_CONFIG_FRONTEND: ""
      N8N_DIAGNOSTICS_CONFIG_BACKEND: ""
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      apps-net:
      services-egress-net:
        gw_priority: 1

  n8n-runners:
    build:
      context: ../..
      dockerfile: infra/docker/images/n8n-runners/Dockerfile
      args:
        N8N_VERSION: ${N8N_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5680/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      <<: *lab-env
      GENERIC_TIMEZONE: ${TZ}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      NODE_OPTIONS: --use-openssl-ca
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: ${N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT}
    networks:
      apps-net:
      services-egress-net:
        gw_priority: 1

  ollama:
    build:
      context: ../..
      dockerfile: infra/docker/images/ollama/Dockerfile
      args:
        OLLAMA_VERSION: ${OLLAMA_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 11434 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s
    environment:
      <<: *lab-env
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: ${OPENWEBUI_URL}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      ai-net:
      services-egress-net:
        gw_priority: 1

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION}
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      <<: *lab-env
      WEBUI_URL: ${OPENWEBUI_URL}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
      CORS_ALLOW_ORIGIN: ${OPENWEBUI_CORS_ALLOW_ORIGIN}
      USER_AGENT: LabAtlas-OpenWebUI/1.0
      ENABLE_OPENAI_API: "false"
      ENABLE_OLLAMA_API: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      RAG_OLLAMA_BASE_URL: http://ollama:11434
      RAG_EMBEDDING_ENGINE: ollama
      RAG_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL}
      USE_EMBEDDING_MODEL_DOCKER: ""
      USE_AUXILIARY_EMBEDDING_MODEL_DOCKER: ""
      AUXILIARY_EMBEDDING_MODEL: ""
      WEBUI_ADMIN_NAME: ${OPENWEBUI_ROOT_NAME}
      WEBUI_ADMIN_EMAIL: ${OPENWEBUI_ROOT_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${OPENWEBUI_ROOT_PASSWORD}
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "true"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      apps-net:
      ai-net:
      services-egress-net:
        gw_priority: 1

  postgres-dev:
    image: postgres:${POSTGRES_DEV_VERSION}
    profiles: ["workbench"]
    restart: unless-stopped
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${POSTGRES_DEV_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_DEV_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEV_DATABASE}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - workbench-net

  node-dev:
    build:
      context: ../..
      dockerfile: infra/docker/images/workbenches/node/Dockerfile
      args:
        BASE_IMAGE: ${NODE_DEV_BASE_IMAGE}
        NODE_VERSION: ${NODE_DEV_NODE_VERSION}
        PNPM_VERSION: ${NODE_DEV_PNPM_VERSION}
        YARN_VERSION: ${NODE_DEV_YARN_VERSION}
        INSTALL_PACKAGES: ${NODE_DEV_INSTALL_PACKAGES}
    profiles: ["workbench"]
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    environment:
      CODE_SERVER_PASSWORD: ${NODE_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${NODE_DEV_AUTH}
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${NODE_DEV_EXTENSIONS}
      NODE_GLOBAL_PACKAGES: ${NODE_DEV_GLOBAL_PACKAGES}
      <<: *workbench-db-env
    volumes:
      - node-dev-home:/home/coder
      - node-dev-workspace:/workspace
    networks:
      workbench-net:
      workbench-egress-net:
        gw_priority: 1

  python-dev:
    build:
      context: ../..
      dockerfile: infra/docker/images/workbenches/python/Dockerfile
      args:
        BASE_IMAGE: ${PYTHON_DEV_BASE_IMAGE}
        PYTHON_VERSION: ${PYTHON_DEV_PYTHON_VERSION}
        INSTALL_PACKAGES: ${PYTHON_DEV_INSTALL_PACKAGES}
        PYTHON_PIP_PACKAGES: ${PYTHON_DEV_PIP_PACKAGES}
        PIP_INDEX_URL: ${PYTHON_DEV_PIP_INDEX_URL}
        PIP_EXTRA_INDEX_URL: ${PYTHON_DEV_PIP_EXTRA_INDEX_URL}
    profiles: ["workbench"]
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    environment:
      CODE_SERVER_PASSWORD: ${PYTHON_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${PYTHON_DEV_AUTH}
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${PYTHON_DEV_EXTENSIONS}
      PYTHON_DEV_PIP_PACKAGES: ${PYTHON_DEV_RUNTIME_PIP_PACKAGES}
      PYTHON_DEV_PIP_EXTRA_INDEX_URL: ${PYTHON_DEV_PIP_EXTRA_INDEX_URL}
      <<: *workbench-db-env
    volumes:
      - python-dev-home:/home/coder
      - python-dev-workspace:/workspace
    networks:
      workbench-net:
      workbench-egress-net:
        gw_priority: 1

  ai-dev:
    build:
      context: ../..
      dockerfile: infra/docker/images/workbenches/python/Dockerfile
      args:
        BASE_IMAGE: ${AI_DEV_BASE_IMAGE}
        PYTHON_VERSION: ${AI_DEV_PYTHON_VERSION}
        INSTALL_PACKAGES: ${AI_DEV_INSTALL_PACKAGES}
        PYTHON_PIP_PACKAGES: ${AI_DEV_PIP_PACKAGES}
        PIP_INDEX_URL: ${AI_DEV_PIP_INDEX_URL}
        PIP_EXTRA_INDEX_URL: ${AI_DEV_PIP_EXTRA_INDEX_URL}
    profiles: ["workbench"]
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    environment:
      CODE_SERVER_PASSWORD: ${AI_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${AI_DEV_AUTH}
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${AI_DEV_EXTENSIONS}
      PYTHON_DEV_PIP_PACKAGES: ${AI_DEV_RUNTIME_PIP_PACKAGES}
      PYTHON_DEV_PIP_EXTRA_INDEX_URL: ${AI_DEV_PIP_EXTRA_INDEX_URL}
      <<: *workbench-db-env
    volumes:
      - ai-dev-home:/home/coder
      - ai-dev-workspace:/workspace
    networks:
      workbench-net:
      workbench-egress-net:
        gw_priority: 1

  cpp-dev:
    build:
      context: ../..
      dockerfile: infra/docker/images/workbenches/cpp/Dockerfile
      args:
        BASE_IMAGE: ${CPP_DEV_BASE_IMAGE}
        CPP_PACKAGES: ${CPP_DEV_PACKAGES}
        INSTALL_PACKAGES: ${CPP_DEV_INSTALL_PACKAGES}
    profiles: ["workbench"]
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    environment:
      CODE_SERVER_PASSWORD: ${CPP_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${CPP_DEV_AUTH}
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${CPP_DEV_EXTENSIONS}
      <<: *workbench-db-env
    volumes:
      - cpp-dev-home:/home/coder
      - cpp-dev-workspace:/workspace
    networks:
      workbench-net:
      workbench-egress-net:
        gw_priority: 1

networks:
  edge-net:
    name: cli-node-lab_edge
  services-egress-net:
    name: cli-node-lab_services_egress
  apps-net:
    name: cli-node-lab_apps
    internal: true
  ai-net:
    name: cli-node-lab_ai
    internal: true
  data-net:
    name: cli-node-lab_data
    internal: true
  workbench-net:
    name: cli-node-lab_workbench
    internal: true
  workbench-egress-net:
    name: cli-node-lab_workbench_egress

volumes:
  gateway-certs:
  gateway-config:
  gateway-site:
  gateway-data:
  gitea-data:
  gitea-db:
  n8n-data:
  ollama-data:
  open-webui-data:
  postgres-dev-data:
  node-dev-home:
  node-dev-workspace:
  python-dev-home:
  python-dev-workspace:
  ai-dev-home:
  ai-dev-workspace:
  cpp-dev-home:
  cpp-dev-workspace:
