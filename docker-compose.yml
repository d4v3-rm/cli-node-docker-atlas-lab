x-lab-env: &lab-env
  TZ: ${TZ}

services:
  gateway:
    build:
      context: ./nginx
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${LAB_HTTP_PORT}:8080"
      - "${LAB_HTTPS_PORT}:8443"
    volumes:
      - gateway-certs:/etc/nginx/certs
    depends_on:
      - gitea
      - n8n
      - open-webui
      - ollama
      - node-dev
      - python-dev
      - ai-dev
      - cpp-dev
    networks:
      - lab

  # Core platform
  gitea:
    image: gitea/gitea:${GITEA_VERSION}
    restart: unless-stopped
    depends_on:
      gitea-db:
        condition: service_healthy
    environment:
      <<: *lab-env
      USER_UID: ${GITEA_UID}
      USER_GID: ${GITEA_GID}
      GITEA__server__DOMAIN: ${LAB_DOMAIN}
      GITEA__server__ROOT_URL: ${LAB_EXTERNAL_URL}/lab/dev/gitea/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__PROTOCOL: http
      GITEA__server__DISABLE_SSH: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: mysql
      GITEA__database__HOST: gitea-db:3306
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__database__SSL_MODE: disable
      GITEA__database__CHARSET: utf8mb4
    volumes:
      - gitea-data:/data
    networks:
      - lab

  gitea-init:
    image: gitea/gitea:${GITEA_VERSION}
    restart: "no"
    depends_on:
      - gitea
    entrypoint: /bin/sh
    command: >-
      -c "
      attempt=0;
      until [ -f /data/gitea/conf/app.ini ]; do
        attempt=$$((attempt+1));
        if [ $$attempt -ge 60 ]; then
          echo 'Gitea configuration not ready' >&2;
          exit 1;
        fi;
        sleep 2;
      done;
      if gitea admin user list --config /data/gitea/conf/app.ini | grep -q '${GITEA_ROOT_USERNAME}'; then
        gitea admin user change-password --config /data/gitea/conf/app.ini --username '${GITEA_ROOT_USERNAME}' --password '${GITEA_ROOT_PASSWORD}';
      else
        gitea admin user create --config /data/gitea/conf/app.ini --username '${GITEA_ROOT_USERNAME}' --password '${GITEA_ROOT_PASSWORD}' --email '${GITEA_ROOT_EMAIL}' --admin --must-change-password=false;
      fi
      "
    volumes:
      - gitea-data:/data
    networks:
      - lab

  gitea-db:
    image: mariadb:11.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p$$MARIADB_ROOT_PASSWORD"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      MARIADB_DATABASE: gitea
      MARIADB_USER: gitea
      MARIADB_PASSWORD: ${GITEA_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${GITEA_DB_ROOT_PASSWORD}
    volumes:
      - gitea-db:/var/lib/mysql
    networks:
      - lab

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION}
    restart: unless-stopped
    environment:
      <<: *lab-env
      GENERIC_TIMEZONE: ${TZ}
      N8N_HOST: ${LAB_DOMAIN}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_PATH: /lab/automation/n8n/
      N8N_EDITOR_BASE_URL: ${LAB_EXTERNAL_URL}/lab/automation/n8n
      WEBHOOK_URL: ${LAB_EXTERNAL_URL}/lab/automation/n8n/
      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - lab

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    restart: unless-stopped
    environment:
      <<: *lab-env
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: ${LAB_EXTERNAL_URL}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - lab

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION}
    restart: unless-stopped
    environment:
      <<: *lab-env
      WEBUI_URL: ${LAB_EXTERNAL_URL}/lab/ai/open-webui
      CORS_ALLOW_ORIGIN: ${LAB_EXTERNAL_URL}
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_ADMIN_NAME: ${OPENWEBUI_ROOT_NAME}
      WEBUI_ADMIN_EMAIL: ${OPENWEBUI_ROOT_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${OPENWEBUI_ROOT_PASSWORD}
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "true"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama
    networks:
      - lab

  # Development environments
  node-dev:
    build:
      context: ./env/node
      args:
        BASE_IMAGE: ${NODE_DEV_BASE_IMAGE}
        NODE_VERSION: ${NODE_DEV_NODE_VERSION}
        PNPM_VERSION: ${NODE_DEV_PNPM_VERSION}
        YARN_VERSION: ${NODE_DEV_YARN_VERSION}
        INSTALL_PACKAGES: ${NODE_DEV_INSTALL_PACKAGES}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${NODE_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${NODE_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/node
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/node
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${NODE_DEV_EXTENSIONS}
      NODE_GLOBAL_PACKAGES: ${NODE_DEV_GLOBAL_PACKAGES}
    volumes:
      - node-dev-home:/home/coder
      - node-dev-workspace:/workspace
    networks:
      - lab

  python-dev:
    build:
      context: ./env/python
      args:
        BASE_IMAGE: ${PYTHON_DEV_BASE_IMAGE}
        PYTHON_VERSION: ${PYTHON_DEV_PYTHON_VERSION}
        INSTALL_PACKAGES: ${PYTHON_DEV_INSTALL_PACKAGES}
        PYTHON_PIP_PACKAGES: ${PYTHON_DEV_PIP_PACKAGES}
        PIP_INDEX_URL: ${PYTHON_DEV_PIP_INDEX_URL}
        PIP_EXTRA_INDEX_URL: ${PYTHON_DEV_PIP_EXTRA_INDEX_URL}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${PYTHON_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${PYTHON_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/python
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/python
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${PYTHON_DEV_EXTENSIONS}
      PYTHON_DEV_PIP_PACKAGES: ${PYTHON_DEV_RUNTIME_PIP_PACKAGES}
      PYTHON_DEV_PIP_EXTRA_INDEX_URL: ${PYTHON_DEV_PIP_EXTRA_INDEX_URL}
    volumes:
      - python-dev-home:/home/coder
      - python-dev-workspace:/workspace
    networks:
      - lab

  ai-dev:
    build:
      context: ./env/python
      args:
        BASE_IMAGE: ${AI_DEV_BASE_IMAGE}
        PYTHON_VERSION: ${AI_DEV_PYTHON_VERSION}
        INSTALL_PACKAGES: ${AI_DEV_INSTALL_PACKAGES}
        PYTHON_PIP_PACKAGES: ${AI_DEV_PIP_PACKAGES}
        PIP_INDEX_URL: ${AI_DEV_PIP_INDEX_URL}
        PIP_EXTRA_INDEX_URL: ${AI_DEV_PIP_EXTRA_INDEX_URL}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${AI_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${AI_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/ai
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/ai
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${AI_DEV_EXTENSIONS}
      PYTHON_DEV_PIP_PACKAGES: ${AI_DEV_RUNTIME_PIP_PACKAGES}
      PYTHON_DEV_PIP_EXTRA_INDEX_URL: ${AI_DEV_PIP_EXTRA_INDEX_URL}
    volumes:
      - ai-dev-home:/home/coder
      - ai-dev-workspace:/workspace
    networks:
      - lab

  cpp-dev:
    build:
      context: ./env/cpp
      args:
        BASE_IMAGE: ${CPP_DEV_BASE_IMAGE}
        CPP_PACKAGES: ${CPP_DEV_PACKAGES}
        INSTALL_PACKAGES: ${CPP_DEV_INSTALL_PACKAGES}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${CPP_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${CPP_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/cpp
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/cpp
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${CPP_DEV_EXTENSIONS}
    volumes:
      - cpp-dev-home:/home/coder
      - cpp-dev-workspace:/workspace
    networks:
      - lab

networks:
  lab:

volumes:
  gateway-certs:
  gitea-data:
  gitea-db:
  n8n-data:
  ollama-data:
  open-webui-data:
  node-dev-home:
  node-dev-workspace:
  python-dev-home:
  python-dev-workspace:
  ai-dev-home:
  ai-dev-workspace:
  cpp-dev-home:
  cpp-dev-workspace:
