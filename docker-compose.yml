x-lab-env: &lab-env
  TZ: ${TZ}

x-penpot-flags: &penpot-flags
  PENPOT_FLAGS: ${PENPOT_FLAGS}

x-penpot-public-uri: &penpot-public-uri
  PENPOT_PUBLIC_URI: ${LAB_EXTERNAL_URL}/lab/design/penpot

x-penpot-body-size: &penpot-body-size
  PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 31457280
  PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600

x-penpot-secret: &penpot-secret
  PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}

x-penpot-db: &penpot-db
  PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
  PENPOT_DATABASE_USERNAME: penpot
  PENPOT_DATABASE_PASSWORD: ${PENPOT_DB_PASSWORD}

x-penpot-redis: &penpot-redis
  PENPOT_REDIS_URI: redis://penpot-valkey/0

services:
  gateway:
    build:
      context: ./nginx
    restart: unless-stopped
    ports:
      - "${LAB_HTTP_PORT}:8080"
      - "${LAB_HTTPS_PORT}:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/html:/usr/share/nginx/html:ro
    environment:
      SSL_CERT_AUTOGEN: ${SSL_CERT_AUTOGEN}
      SSL_CERT_CN: ${SSL_CERT_CN}
      SSL_CERT_SAN: ${SSL_CERT_SAN}
      SSL_CERT_DAYS: ${SSL_CERT_DAYS}
    depends_on:
      - gitea
      - penpot-frontend
      - drawio
      - marktext
      - bookstack
      - node-dev
      - python-dev
      - ai-dev
      - cpp-dev
    networks:
      - lab

  # Dev tools
  gitea:
    image: gitea/gitea:${GITEA_VERSION}
    restart: unless-stopped
    depends_on:
      gitea-db:
        condition: service_healthy
    environment:
      <<: *lab-env
      USER_UID: ${GITEA_UID}
      USER_GID: ${GITEA_GID}
      GITEA__server__DOMAIN: ${LAB_DOMAIN}
      GITEA__server__ROOT_URL: ${LAB_EXTERNAL_URL}/lab/dev/gitea/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__DISABLE_SSH: "true"
      GITEA__database__DB_TYPE: mysql
      GITEA__database__HOST: gitea-db:3306
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__database__SSL_MODE: disable
      GITEA__database__CHARSET: utf8mb4
    volumes:
      - gitea-data:/data
    networks:
      - lab

  gitea-db:
    image: mariadb:11.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p$$MARIADB_ROOT_PASSWORD"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      MARIADB_DATABASE: gitea
      MARIADB_USER: gitea
      MARIADB_PASSWORD: ${GITEA_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${GITEA_DB_ROOT_PASSWORD}
    volumes:
      - gitea-db:/var/lib/mysql
    networks:
      - lab

  # Design tools
  penpot-frontend:
    image: "penpotapp/frontend:${PENPOT_VERSION}"
    restart: unless-stopped
    depends_on:
      - penpot-backend
      - penpot-exporter
    environment:
      <<: [*lab-env, *penpot-flags, *penpot-public-uri, *penpot-body-size]
    networks:
      - lab

  penpot-backend:
    image: "penpotapp/backend:${PENPOT_VERSION}"
    restart: unless-stopped
    depends_on:
      penpot-postgres:
        condition: service_healthy
      penpot-valkey:
        condition: service_healthy
    volumes:
      - penpot-assets:/opt/data/assets
    environment:
      <<: [*lab-env, *penpot-flags, *penpot-public-uri, *penpot-body-size, *penpot-secret, *penpot-db, *penpot-redis]
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
      PENPOT_TELEMETRY_REFERER: compose
    networks:
      - lab

  penpot-exporter:
    image: "penpotapp/exporter:${PENPOT_VERSION}"
    restart: unless-stopped
    depends_on:
      penpot-valkey:
        condition: service_healthy
    environment:
      <<: [*lab-env, *penpot-secret, *penpot-redis]
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
    networks:
      - lab

  penpot-postgres:
    image: postgres:15
    restart: unless-stopped
    stop_signal: SIGINT
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 2s
    volumes:
      - penpot-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: ${PENPOT_DB_PASSWORD}
    networks:
      - lab

  penpot-valkey:
    image: valkey/valkey:8.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 3s
    environment:
      VALKEY_EXTRA_FLAGS: --maxmemory 128mb --maxmemory-policy volatile-lfu
    networks:
      - lab

  drawio:
    image: jgraph/drawio:${DRAWIO_VERSION}
    restart: unless-stopped
    networks:
      - lab

  # Docs tools
  marktext:
    build:
      context: ./marktext
      args:
        MARKTEXT_VERSION: ${MARKTEXT_VERSION}
    restart: unless-stopped
    environment:
      <<: *lab-env
    volumes:
      - marktext-config:/config
    networks:
      - lab

  bookstack:
    image: lscr.io/linuxserver/bookstack:${BOOKSTACK_VERSION}
    restart: unless-stopped
    depends_on:
      bookstack-db:
        condition: service_healthy
    environment:
      PUID: ${BOOKSTACK_UID}
      PGID: ${BOOKSTACK_GID}
      TZ: ${TZ}
      APP_URL: ${LAB_EXTERNAL_URL}/lab/docs/bookstack
      APP_KEY: ${BOOKSTACK_APP_KEY}
      DB_HOST: bookstack-db
      DB_PORT: 3306
      DB_USERNAME: bookstack
      DB_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
      DB_DATABASE: bookstack
    volumes:
      - bookstack-config:/config
    networks:
      - lab

  bookstack-db:
    image: mariadb:11.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p$$MARIADB_ROOT_PASSWORD"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      MARIADB_DATABASE: bookstack
      MARIADB_USER: bookstack
      MARIADB_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${BOOKSTACK_DB_ROOT_PASSWORD}
    volumes:
      - bookstack-db:/var/lib/mysql
    networks:
      - lab

  # Env tools
  node-dev:
    build:
      context: ./env/node
      args:
        BASE_IMAGE: ${NODE_DEV_BASE_IMAGE}
        NODE_VERSION: ${NODE_DEV_NODE_VERSION}
        PNPM_VERSION: ${NODE_DEV_PNPM_VERSION}
        YARN_VERSION: ${NODE_DEV_YARN_VERSION}
        INSTALL_PACKAGES: ${NODE_DEV_INSTALL_PACKAGES}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${NODE_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${NODE_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/node
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/node
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${NODE_DEV_EXTENSIONS}
      NODE_GLOBAL_PACKAGES: ${NODE_DEV_GLOBAL_PACKAGES}
    volumes:
      - node-dev-home:/home/coder
      - node-dev-workspace:/workspace
    networks:
      - lab

  python-dev:
    build:
      context: ./env/python
      args:
        BASE_IMAGE: ${PYTHON_DEV_BASE_IMAGE}
        PYTHON_VERSION: ${PYTHON_DEV_PYTHON_VERSION}
        INSTALL_PACKAGES: ${PYTHON_DEV_INSTALL_PACKAGES}
        PYTHON_PIP_PACKAGES: ${PYTHON_DEV_PIP_PACKAGES}
        PIP_INDEX_URL: ${PYTHON_DEV_PIP_INDEX_URL}
        PIP_EXTRA_INDEX_URL: ${PYTHON_DEV_PIP_EXTRA_INDEX_URL}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${PYTHON_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${PYTHON_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/python
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/python
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${PYTHON_DEV_EXTENSIONS}
      PYTHON_DEV_PIP_PACKAGES: ${PYTHON_DEV_RUNTIME_PIP_PACKAGES}
      PYTHON_DEV_PIP_EXTRA_INDEX_URL: ${PYTHON_DEV_PIP_EXTRA_INDEX_URL}
    volumes:
      - python-dev-home:/home/coder
      - python-dev-workspace:/workspace
    networks:
      - lab

  ai-dev:
    build:
      context: ./env/python
      args:
        BASE_IMAGE: ${AI_DEV_BASE_IMAGE}
        PYTHON_VERSION: ${AI_DEV_PYTHON_VERSION}
        INSTALL_PACKAGES: ${AI_DEV_INSTALL_PACKAGES}
        PYTHON_PIP_PACKAGES: ${AI_DEV_PIP_PACKAGES}
        PIP_INDEX_URL: ${AI_DEV_PIP_INDEX_URL}
        PIP_EXTRA_INDEX_URL: ${AI_DEV_PIP_EXTRA_INDEX_URL}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${AI_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${AI_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/ai
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/ai
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${AI_DEV_EXTENSIONS}
      PYTHON_DEV_PIP_PACKAGES: ${AI_DEV_RUNTIME_PIP_PACKAGES}
      PYTHON_DEV_PIP_EXTRA_INDEX_URL: ${AI_DEV_PIP_EXTRA_INDEX_URL}
    volumes:
      - ai-dev-home:/home/coder
      - ai-dev-workspace:/workspace
    networks:
      - lab

  cpp-dev:
    build:
      context: ./env/cpp
      args:
        BASE_IMAGE: ${CPP_DEV_BASE_IMAGE}
        CPP_PACKAGES: ${CPP_DEV_PACKAGES}
        INSTALL_PACKAGES: ${CPP_DEV_INSTALL_PACKAGES}
    restart: unless-stopped
    environment:
      CODE_SERVER_PASSWORD: ${CPP_DEV_PASSWORD}
      CODE_SERVER_AUTH: ${CPP_DEV_AUTH}
      CODE_SERVER_BASE_PATH: /lab/env/cpp
      CODE_SERVER_BIND_ADDR: 0.0.0.0:8080
      CODE_SERVER_ABS_PROXY_BASE_PATH: /lab/env/cpp
      CODE_SERVER_WORKDIR: /workspace
      CODE_SERVER_EXTENSIONS: ${CPP_DEV_EXTENSIONS}
    volumes:
      - cpp-dev-home:/home/coder
      - cpp-dev-workspace:/workspace
    networks:
      - lab

networks:
  lab:

volumes:
  gitea-data:
  gitea-db:
  penpot-assets:
  penpot-postgres:
  marktext-config:
  bookstack-config:
  bookstack-db:
  node-dev-home:
  node-dev-workspace:
  python-dev-home:
  python-dev-workspace:
  ai-dev-home:
  ai-dev-workspace:
  cpp-dev-home:
  cpp-dev-workspace:
